services:

  # -- Next.js Frontend --

  frontend:
    build:
      context: ./nextjs-code
      dockerfile: Dockerfile
    ports:
      - "3333:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - rag-network


  # -- Python FastAPI Backend --

  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./python-backend/.env
    volumes:
      - backend-data:/app/runtime-data
      - model-cache:/root/.cache
    environment:
      - CHROMA_PATH=/app/runtime-data/chroma
      - SQLITE_BM25_PATH=/app/runtime-data/bm25.db
      - SQLITE_CHAT_PATH=/app/runtime-data/chat.db
    networks:
      - rag-network


  # -- Cloudflare Tunnel --

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - rag-network
    restart: unless-stopped


networks:
  rag-network:
    driver: bridge


volumes:
  backend-data:
  model-cache:
