services:

  # -- Next.js Frontend --

  frontend:
    build:
      context: ./nextjs-code
      dockerfile: Dockerfile
    ports:
      - "3333:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - rag-network


  # -- Python FastAPI Backend --

  backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    env_file:
      - ./python-backend/.env
    volumes:
      - backend-data:/app/data
    networks:
      - rag-network


networks:
  rag-network:
    driver: bridge


volumes:
  backend-data:
